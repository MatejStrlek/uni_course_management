spring.application.name=uni_course_management

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:unicoursemanagament;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=always
spring.sql.init.platform=h2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=false

server.port=8081

# Mail — real credentials injected via env vars in CI; safe defaults for local test runs
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:ci-test@example.com}
spring.mail.password=${MAIL_PASSWORD:ci-test-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT — real secret injected via env var in CI; safe 256-bit+ default for local test runs
jwt.secret=${JWT_SECRET:CiTestSecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmOk}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=2592000000
